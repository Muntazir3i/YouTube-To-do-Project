<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo Application</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
    rel="stylesheet">
</head>

<body>

  <div class="main-todo-container">

    <section class="title-input-container">
      <div class="title-icon-container">
        <h1 class="title">TODO</h1>
        <img src="./images/icon-sun.svg" alt="">
      </div>
      <div class="input-container">
        <input type="text" class="todo-input" placeholder="Create a new todo...">
      </div>
    </section>

    <section class="todos-container">
      <ul class="radio-label-container">
      </ul>
      <div class="progress-clear-container">

      </div>
    </section>

    <section class="option-container">
      <button class="all-btn">ALL</button>
      <button class="active-btn">Active</button>
      <button class="comp-btn">Completed</button>
    </section>

  </div>
  
  

  <script src="script.js"></script>
</body>

</html>
